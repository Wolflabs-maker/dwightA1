<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLFLIX: Dwight's Toilet Office</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (Version 18) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Compiles JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0A0A0A] text-white overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- DATA SOURCE: 25 EXERCISES (A1 LEVEL) ---

        const VOCAB_HUNT = [
            { context: "A table used for working or studying.", q: "What is this object?", answer: "Desk", options: ["Desk", "Sink", "Toilet", "Chair"] },
            { context: "A room with a toilet and a sink.", q: "Where is Dwight's desk?", answer: "Bathroom", options: ["Kitchen", "Bedroom", "Bathroom", "Garage"] },
            { context: "A funny trick or a practical joke.", q: "What did Jim do to Dwight?", answer: "Prank", options: ["Meeting", "Prank", "Presentation", "Email"] },
            { context: "Getting closer to the hidden object.", q: "If you are very close, you are...", answer: "Warmer", options: ["Colder", "Warmer", "Ice cold", "Lost"] },
            { context: "Getting further away from the object.", q: "If you move away, you are...", answer: "Colder", options: ["Colder", "Warmer", "Hot", "Fire"] }
        ];

        const PREPOSITION_MATRIX = [
            { context: "The desk is ___ the bathroom.", q: "Select the correct preposition:", answer: "in", options: ["on", "in", "under", "next to"] },
            { context: "Dwight's phone is ___ the desk.", q: "Select the correct preposition:", answer: "on", options: ["under", "in", "on", "next to"] },
            { context: "The bag is ___ the chair.", q: "Select the correct preposition:", answer: "on", options: ["on", "next to", "in", "under"] },
            { context: "Dwight's feet are ___ the desk.", q: "Select the correct preposition:", answer: "under", options: ["on", "in", "under", "next to"] },
            { context: "The toilet is ___ the desk in the prank.", q: "Select the correct preposition:", answer: "next to", options: ["on", "next to", "in", "under"] }
        ];

        const WHERE_IS_UNIT = [
            { context: "I can't see my coffee!", q: "___ is my coffee mug?", answer: "Where", options: ["What", "Who", "Where", "When"] },
            { context: "___ is Dwight?", q: "He is in the bathroom.", answer: "Where", options: ["Where", "Why", "Which", "How"] },
            { context: "___ is the prank happening?", q: "It's happening in the office.", answer: "Where", options: ["Who", "Where", "What", "When"] },
            { context: "___ is my desk lamp?", q: "It is next to the monitor.", answer: "Where", options: ["Where", "What", "Who", "How"] },
            { context: "___ are my shoes?", q: "They are under the bed.", answer: "Where", options: ["Where", "When", "What", "Who"] }
        ];

        const SEARCH_REPORTS = [
            { 
                text: "Jim hid the (1) ____ in the (2) ____.",
                blanks: [
                    { id: 1, correct: "desk", options: ["desk", "chair"] },
                    { id: 2, correct: "bathroom", options: ["kitchen", "bathroom"] }
                ]
            },
            { 
                text: "Dwight says: (1) ____ is my desk? Jim says: You are getting (2) ____!",
                blanks: [
                    { id: 1, correct: "Where", options: ["Where", "What"] },
                    { id: 2, correct: "warmer", options: ["colder", "warmer"] }
                ]
            },
            { 
                text: "The phone is (1) ____ the desk. The desk is (2) ____ to the toilet.",
                blanks: [
                    { id: 1, correct: "on", options: ["in", "on"] },
                    { id: 2, correct: "next", options: ["next", "under"] }
                ]
            },
            { 
                text: "This is a great (1) ____. Jim is a funny (2) ____.",
                blanks: [
                    { id: 1, correct: "prank", options: ["meeting", "prank"] },
                    { id: 2, correct: "coworker", options: ["boss", "coworker"] }
                ]
            },
            { 
                text: "My bag is (1) ____ the chair. My shoes are (2) ____ the bed.",
                blanks: [
                    { id: 1, correct: "on", options: ["on", "in"] },
                    { id: 2, correct: "under", options: ["under", "next to"] }
                ]
            }
        ];

        const SPEAKING_STARTERS = [
            { title: "Finding the Desk", context: "You just found your desk in a strange place.", starter: "Where is my desk? Oh! It is in the..." },
            { title: "The Warmer Game", context: "Helping someone find a lost item.", starter: "You are getting warmer! The item is next to..." },
            { title: "Describing the Room", context: "Tell Jim where the items are.", starter: "My phone is on the... and my bag is under..." },
            { title: "Prank Reaction", context: "Reaction to Jim's prank.", starter: "The prank was very... because my desk is..." },
            { title: "The Office Tour", context: "Show Dwight where he is working.", starter: "Welcome to your new office! It is in the..." }
        ];

        const LAB_DATA = [
            { id: "ACT-01", title: "Vocab Scan", icon: "fas fa-search", description: "Identify office objects and prank terms.", tracks: VOCAB_HUNT, type: "decoder" },
            { id: "ACT-02", title: "Preposition Lab", icon: "fas fa-map-marker-alt", description: "Master in, on, under, and next to.", tracks: PREPOSITION_MATRIX, type: "decoder" },
            { id: "ACT-03", title: "Where is Unit?", icon: "fas fa-question-circle", description: "Master the question structure 'Where is...?'", tracks: WHERE_IS_UNIT, type: "decoder" },
            { id: "ACT-04", title: "Evidence Log", icon: "fas fa-file-alt", description: "Complete the investigative prank report.", tracks: SEARCH_REPORTS, type: "cloze" },
            { id: "ACT-05", title: "Vocal Mission", icon: "fas fa-microphone", description: "Answer using Speaking Starters.", tracks: SPEAKING_STARTERS, type: "speaking" }
        ];

        // --- MAIN APPLICATION COMPONENT ---

        function App() {
            const [view, setView] = useState('home'); 
            const [activeActIndex, setActiveActIndex] = useState(0);
            const [currentStep, setCurrentStep] = useState(0);
            const [score, setScore] = useState(0);
            
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [clozeSelections, setClozeSelections] = useState({});
            const [isAnswerVerified, setIsAnswerVerified] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });

            const activeActivity = useMemo(() => LAB_DATA[activeActIndex], [activeActIndex]);
            const currentTrack = useMemo(() => activeActivity.tracks[currentStep], [activeActivity, currentStep]);

            const showToast = (msg, type = 'success') => {
                setToast({ show: true, msg, type });
                setTimeout(() => setToast({ show: false, msg: '', type: 'success' }), 2500);
            };

            const startExercise = (index) => {
                setActiveActIndex(index);
                setCurrentStep(0);
                resetState();
                setView('exercise');
            };

            const resetState = () => {
                setSelectedAnswer(null);
                setClozeSelections({});
                setIsAnswerVerified(false);
                setIsRecording(false);
                setIsProcessing(false);
            };

            const verifyAnswer = () => {
                if (activeActivity.type === 'decoder') {
                    if (selectedAnswer === currentTrack.answer) {
                        setScore(s => s + 100);
                        showToast("TARGET IDENTIFIED! +100 XP", 'success');
                        setIsAnswerVerified(true);
                    } else {
                        showToast("DATA ERROR: WRONG LOCATION.", 'error');
                    }
                } else if (activeActivity.type === 'cloze') {
                    const isCorrect = currentTrack.blanks.every(b => clozeSelections[b.id] === b.correct);
                    if (isCorrect) {
                        setScore(s => s + 200);
                        showToast("REPORT COMPLETED! +200 XP", 'success');
                        setIsAnswerVerified(true);
                    } else {
                        showToast("LOGIC ERROR: CHECK THE BLANKS.", 'error');
                    }
                } else {
                    setIsProcessing(true);
                    setTimeout(() => {
                        setIsProcessing(false);
                        setScore(s => s + 300);
                        showToast("VOICE LOGGED! +300 XP", 'success');
                        setIsAnswerVerified(true);
                    }, 1500);
                }
            };

            const nextStep = () => {
                if (currentStep + 1 < activeActivity.tracks.length) {
                    setCurrentStep(s => s + 1);
                    resetState();
                } else {
                    setView('completion');
                }
            };

            return (
                <div className="min-h-screen font-sans">
                    {/* CINEMATIC BACKGROUND */}
                    <div className="fixed inset-0 pointer-events-none z-0">
                        <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-red-900/10 blur-[120px] rounded-full"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-900/10 blur-[120px] rounded-full"></div>
                    </div>

                    <div className="flex h-screen relative z-10">
                        {/* WOLFLIX SIDEBAR */}
                        <aside className="w-72 bg-[#0A0A0A] border-r border-[#181818] flex flex-col justify-between hidden md:flex h-full shadow-2xl">
                            <div>
                                <div className="p-8 border-b border-[#181818]">
                                    <h1 className="text-3xl font-black tracking-tighter flex items-center gap-2 text-red-600">
                                        WOLFLIX
                                    </h1>
                                    <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">Cinematic Architect</p>
                                </div>
                                <nav className="px-4 space-y-2 mt-6 text-left">
                                    <button onClick={() => view !== 'exercise' && setView('home')} className={`w-full flex items-center gap-4 px-4 py-3 font-bold rounded-xl transition-all ${view === 'home' || view === 'completion' ? 'bg-[#181818] text-white border border-[#282828]' : 'text-gray-500 hover:text-white hover:bg-[#121212]'}`}>
                                        <i className={`fas fa-tv ${view === 'home' ? "text-red-500" : ""}`}></i>
                                        Sessions
                                    </button>
                                    <button className="w-full flex items-center gap-4 px-4 py-3 font-bold text-gray-500 hover:text-white rounded-xl hover:bg-[#121212] transition-all">
                                        <i className="fas fa-chart-line"></i>
                                        Prank History
                                    </button>
                                </nav>
                            </div>
                            <div className="p-4 border-t border-[#181818]">
                                <div className="bg-[#121212] border border-[#282828] rounded-2xl p-4 flex items-center gap-4">
                                    <div className="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center text-white font-bold">D</div>
                                    <div className="flex-1 overflow-hidden text-left">
                                        <p className="text-sm font-bold text-white truncate">Dwight_Schrute</p>
                                        <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Assistant Manager</p>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* CONTENT STAGE */}
                        <main className="flex-1 flex flex-col bg-[#0F0F0F] relative overflow-hidden h-full">
                            
                            {/* HUB VIEW */}
                            {view === 'home' && (
                                <div className="flex-1 overflow-y-auto p-8 lg:p-12 animate-in fade-in duration-700">
                                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6 text-left">
                                        <div>
                                            <p className="text-red-500 font-bold tracking-widest uppercase text-sm mb-2 flex items-center gap-2">
                                                <i className="fas fa-desktop"></i> NOW PLAYING: THE OFFICE
                                            </p>
                                            <h2 className="text-5xl md:text-6xl font-black tracking-tight text-white mb-4 italic uppercase">Dwight's Toilet Office</h2>
                                            <p className="text-gray-400 text-xl max-w-3xl leading-relaxed">Where is the desk? Master spatial prepositions through the classic missing desk prank. Phase A1 Active.</p>
                                        </div>
                                        <div className="bg-[#181818] border border-[#282828] rounded-2xl px-8 py-6 text-center min-w-[180px] shadow-2xl">
                                            <p className="text-xs text-gray-500 uppercase tracking-widest mb-1 font-bold">Total Mastery</p>
                                            <p className="text-4xl font-black text-red-500">{score}</p>
                                        </div>
                                    </header>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 pb-20">
                                        {LAB_DATA.map((act, idx) => (
                                            <div key={act.id} onClick={() => startExercise(idx)} className="group bg-gradient-to-br from-[#181818] to-[#121212] border border-[#282828] hover:border-red-500/50 hover:-translate-y-2 rounded-3xl p-8 transition-all duration-300 cursor-pointer relative overflow-hidden">
                                                <div className="relative z-10 text-left">
                                                    <div className="w-14 h-14 rounded-2xl bg-red-600/10 flex items-center justify-center text-red-500 group-hover:bg-red-600 group-hover:text-white mb-8 transition-all text-2xl">
                                                        <i className={act.icon}></i>
                                                    </div>
                                                    <h3 className="text-2xl font-bold mb-3 text-white italic">{act.title}</h3>
                                                    <p className="text-sm text-gray-400 mb-8 leading-relaxed">{act.description}</p>
                                                    <div className="flex justify-between items-center text-[10px] font-bold text-gray-500 uppercase tracking-widest border-t border-[#282828] pt-4">
                                                        <span>{act.tracks.length} Scenarios</span>
                                                        <span className="text-red-500">A1 Level</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* EXERCISE VIEW */}
                            {view === 'exercise' && (
                                <div className="flex-1 flex flex-col h-full animate-in fade-in duration-500">
                                    <header className="p-6 border-b border-[#181818] bg-[#0A0A0A]/80 backdrop-blur-md flex items-center justify-between">
                                        <div className="flex items-center gap-6 w-1/3 text-left">
                                            <button onClick={() => setView('home')} className="w-10 h-10 rounded-full bg-[#181818] border border-[#282828] flex items-center justify-center text-gray-400 hover:text-white hover:border-red-500 transition-all">
                                                <i className="fas fa-times"></i>
                                            </button>
                                            <div className="hidden sm:block">
                                                <p className="text-[10px] text-gray-500 uppercase tracking-widest font-bold">{activeActivity.id}</p>
                                                <p className="font-bold text-sm text-white italic">{activeActivity.title}</p>
                                            </div>
                                        </div>

                                        <div className="w-1/3 flex flex-col items-center">
                                            <div className="flex justify-between w-full max-w-[250px] text-[10px] text-gray-500 mb-2 font-bold uppercase tracking-widest">
                                                <span>Scene 0{currentStep + 1} / 0{activeActivity.tracks.length}</span>
                                            </div>
                                            <div className="w-full max-w-[250px] h-1.5 bg-[#282828] rounded-full overflow-hidden">
                                                <div className="h-full bg-red-600 transition-all duration-700 ease-out" style={{ width: `${((currentStep + 1) / activeActivity.tracks.length) * 100}%` }}></div>
                                            </div>
                                        </div>

                                        <div className="w-1/3 text-right">
                                            <span className="bg-[#181818] border border-[#282828] px-4 py-2 rounded-full text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                                                Score: <span className="text-red-500 text-sm">{score}</span>
                                            </span>
                                        </div>
                                    </header>

                                    <div className="flex-1 overflow-y-auto flex flex-col justify-center p-6 pb-40">
                                        <div className="w-full flex justify-center">
                                            
                                            {/* DECODER */}
                                            {activeActivity.type === 'decoder' && (
                                                <div className="w-full max-w-4xl flex flex-col items-center gap-12">
                                                    <div className="flex flex-col md:flex-row gap-6 w-full">
                                                        <div className="flex-1 bg-red-950/10 border border-red-500/20 rounded-3xl p-10 text-left">
                                                            <p className="text-red-500 font-bold text-xs uppercase mb-6 tracking-widest border-b border-red-500/10 pb-2">Analysis</p>
                                                            <h2 className="text-3xl font-medium text-white italic leading-relaxed">"{currentTrack.context}"</h2>
                                                        </div>
                                                        <div className="flex-1 bg-white/5 border border-white/10 rounded-3xl p-10 text-left">
                                                            <p className="text-gray-500 font-bold text-xs uppercase mb-6 tracking-widest border-b border-white/5 pb-2">Question</p>
                                                            <h2 className="text-3xl font-medium text-white leading-relaxed italic">
                                                                {currentTrack.q.replace('___', selectedAnswer || '____')}
                                                            </h2>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 w-full">
                                                        {currentTrack.options.map(opt => (
                                                            <button key={opt} onClick={() => !isAnswerVerified && setSelectedAnswer(opt)} className={`p-6 rounded-2xl font-bold uppercase transition-all border-2 text-lg ${selectedAnswer === opt ? 'bg-red-600 border-red-600 text-white shadow-[0_0_20px_rgba(220,38,38,0.3)]' : 'bg-[#181818] border-[#282828] text-gray-500 hover:text-white hover:border-gray-500'}`}>
                                                                {opt}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* CLOZE */}
                                            {activeActivity.type === 'cloze' && (
                                                <div className="w-full max-w-4xl bg-[#181818] border border-[#282828] rounded-3xl p-12 shadow-2xl text-left">
                                                    <div className="text-3xl font-medium leading-[4.5rem] text-gray-300">
                                                        {currentTrack.text.split(/(\(\d\)\s____)/).map((part, i) => {
                                                            const match = part.match(/\((\d)\)\s____/);
                                                            if (match) {
                                                                const blankId = parseInt(match[1]);
                                                                const blank = currentTrack.blanks.find(b => b.id === blankId);
                                                                return (
                                                                    <span key={i} className="inline-flex mx-4 relative group">
                                                                        <select value={clozeSelections[blankId] || ""} onChange={(e) => setClozeSelections({...clozeSelections, [blankId]: e.target.value})} disabled={isAnswerVerified} className={`appearance-none bg-black/40 border-b-2 px-6 py-1 rounded focus:outline-none transition-all font-bold uppercase text-xl ${clozeSelections[blankId] ? 'border-red-600 text-red-500' : 'border-gray-700 text-gray-600'}`}>
                                                                            <option value="">---</option>
                                                                            {blank.options.map(o => <option key={o} value={o}>{o}</option>)}
                                                                        </select>
                                                                    </span>
                                                                );
                                                            }
                                                            return <span key={i}>{part}</span>;
                                                        })}
                                                    </div>
                                                </div>
                                            )}

                                            {/* SPEAKING */}
                                            {activeActivity.type === 'speaking' && (
                                                <div className="w-full max-w-3xl flex flex-col items-center">
                                                    <div className="w-full bg-[#181818] border border-[#282828] rounded-3xl p-10 mb-10 text-center shadow-2xl relative overflow-hidden">
                                                        <div className="absolute top-[-50px] left-[-50px] w-40 h-40 bg-red-600/5 rounded-full blur-3xl"></div>
                                                        <p className="text-[10px] text-red-500 uppercase font-bold mb-6 tracking-widest flex items-center justify-center gap-2"><i className="fas fa-desktop"></i> {currentTrack.title}</p>
                                                        <h2 className="text-3xl md:text-4xl font-black text-white italic mb-10 leading-relaxed text-left italic">"{currentTrack.context}"</h2>
                                                        <div className="bg-black/50 p-8 rounded-3xl border border-white/5 text-left w-full">
                                                            <p className="text-[10px] text-gray-500 uppercase font-bold mb-3">Speaking Starter</p>
                                                            <p className="text-2xl font-bold text-red-500 italic leading-snug tracking-tight">"{currentTrack.starter}"</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col items-center gap-6">
                                                        <button onClick={() => !isAnswerVerified && setIsRecording(!isRecording)} className={`w-32 h-32 rounded-full flex items-center justify-center transition-all ${isRecording ? 'bg-red-600 animate-pulse shadow-[0_0_50px_rgba(220,38,38,0.5)] scale-110' : isAnswerVerified ? 'bg-white text-black' : 'bg-[#181818] border-2 border-red-600 text-red-500 hover:scale-105'} text-4xl`}>
                                                            {isProcessing ? <i className="fas fa-spinner fa-spin"></i> : isAnswerVerified ? <i className="fas fa-check-circle"></i> : <i className="fas fa-microphone"></i>}
                                                        </button>
                                                        <p className={`text-sm font-bold tracking-[0.2em] uppercase ${isRecording ? 'text-red-500' : 'text-gray-500'}`}>{isRecording ? 'Recording Audio...' : isProcessing ? 'Decoding...' : isAnswerVerified ? 'Locked & Loaded' : 'Hold to speak'}</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* ACTION FOOTER */}
                                    <div className="absolute bottom-0 w-full p-8 bg-gradient-to-t from-[#0A0A0A] via-[#0A0A0A] to-transparent flex justify-center pb-12 z-40">
                                        {!isAnswerVerified ? (
                                            <button onClick={verifyAnswer} disabled={(!selectedAnswer && Object.keys(clozeSelections).length === 0 && !isRecording) || isProcessing} className="w-full max-w-lg py-5 rounded-full bg-red-600 text-white font-black uppercase tracking-[0.2em] flex items-center justify-center gap-3 transition-all hover:bg-red-500 disabled:opacity-20 shadow-[0_10px_30px_rgba(220,38,38,0.3)] hover:scale-[1.03]">
                                                Lock Selection <i className="fas fa-shield-alt"></i>
                                            </button>
                                        ) : (
                                            <button onClick={nextStep} className="w-full max-w-lg py-5 rounded-full bg-blue-600 text-white font-black uppercase tracking-[0.2em] flex items-center justify-center gap-3 transition-all hover:bg-blue-500 hover:scale-[1.03] shadow-[0_10px_30px_rgba(37,99,235,0.3)]">
                                                Synchronize Next <i className="fas fa-forward"></i>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* FINAL RESULTS VIEW */}
                            {view === 'completion' && (
                                <div className="flex-1 flex flex-col items-center justify-center relative p-6 text-center animate-in fade-in duration-700">
                                    <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(220,38,38,0.1)_0%,transparent_70%)] pointer-events-none"></div>
                                    <div className="relative z-10 max-w-2xl w-full">
                                        <div className="w-28 h-28 mx-auto rounded-3xl bg-red-600 flex items-center justify-center mb-10 shadow-[0_0_40px_rgba(220,38,38,0.4)] rotate-3 text-5xl text-white">
                                            <i className="fas fa-check-circle"></i>
                                        </div>
                                        <h1 className="text-6xl font-black mb-6 tracking-tighter uppercase text-white italic">Mission Accomplished</h1>
                                        <p className="text-2xl text-gray-400 mb-12">You found the desk! Spatial prepositions are now 100% synchronized in your neural network.</p>
                                        <div className="bg-[#181818] border border-[#282828] rounded-3xl p-10 mb-12 flex justify-around shadow-lg">
                                            <div className="text-center">
                                                <p className="text-xs text-gray-500 uppercase tracking-widest mb-3 font-bold">Total Gain</p>
                                                <p className="text-5xl font-black text-red-600">+{score} XP</p>
                                            </div>
                                            <div className="w-px bg-[#282828]"></div>
                                            <div className="text-center">
                                                <p className="text-xs text-gray-500 uppercase tracking-widest mb-3 font-bold">Efficiency</p>
                                                <p className="text-5xl font-black text-white italic">A1+</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setView('home')} className="w-full py-6 rounded-3xl bg-[#282828] text-white font-black uppercase tracking-[0.2em] hover:bg-white hover:text-black transition-all border border-[#3E3E3E]">Return to Cinema Hub</button>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* SYSTEM TOASTS */}
                    <div className={`fixed top-8 left-1/2 transform -translate-x-1/2 px-10 py-5 rounded-3xl font-bold shadow-2xl transition-all duration-300 z-[100] flex items-center gap-4 border-2 ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-6 pointer-events-none'} ${toast.type === 'success' ? 'bg-red-600 text-white border-red-500' : 'bg-gray-800 text-white border-gray-700'}`}>
                        {toast.type === 'success' ? <i className="fas fa-check-circle text-2xl"></i> : <i className="fas fa-exclamation-triangle text-2xl"></i>}
                        <span className="text-lg uppercase tracking-widest font-black">{toast.msg}</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
